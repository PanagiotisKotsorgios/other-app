<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    # ── Reverse-proxy / ngrok support ───────────────────────────────
    # Trust X-Forwarded-For from loopback and private networks
    # (Docker bridge is 172.16-172.31; ngrok tunnels via 127.0.0.1)
    RemoteIPHeader X-Forwarded-For
    RemoteIPInternalProxy 127.0.0.1
    RemoteIPInternalProxy 10.0.0.0/8
    RemoteIPInternalProxy 172.16.0.0/12
    RemoteIPInternalProxy 192.168.0.0/16

    # Expose the real protocol to PHP via $_SERVER['HTTPS'] and HTTPS env var
    # ngrok sets X-Forwarded-Proto: https; Apache passes it to PHP scripts
    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Security headers (only set once — .htaccess may also set these)
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
