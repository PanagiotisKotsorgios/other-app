services:

  # ── PHP + Apache ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: callcenter:latest
    container_name: callcenter_app
    restart: unless-stopped
    environment:
      APP_NAME: "Call Center CRM"
      APP_URL: "http://localhost"
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: call_center
      DB_USERNAME: crm_user
      DB_PASSWORD: "${DB_PASSWORD:-CrmSecure2024Db}"
      COMMISSION_RATE: "10"
      UPLOAD_MAX_SIZE: "104857600"
    volumes:
      - uploads:/var/www/html/public/assets/uploads
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - callcenter_net

  # ── MySQL 8.0 ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: callcenter_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: call_center
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: "${DB_PASSWORD:-CrmSecure2024Db}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-RootSecure2024Db}"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/migration_v2.sql:/docker-entrypoint-initdb.d/02_migration_v2.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-u", "crm_user", "-p${DB_PASSWORD:-CrmSecure2024Db}", "call_center", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 15s
    networks:
      - callcenter_net

volumes:
  db_data:
  uploads:

networks:
  callcenter_net:
    name: callcenter_net
    driver: bridge
